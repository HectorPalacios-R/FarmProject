name: Advanced CI/CD Integration Pipeline

on:
  push:
    branches: ["main", "master"]

  pull_request:
    branches: ["main", "master"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:

  code-quality:
    name: Code Quality and Formatting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Restore Dependencies
        run: dotnet restore

      - name: Verify Code Formatting
        run: dotnet format --verify-no-changes --severity warn

      - name: Static Code Analysis
        run: dotnet build --configuration Release /warnaserror

  compile-and-build:
    name: Docker Build and Package
    runs-on: ubuntu-latest
    needs: code-quality

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Build Application Containers
        run: docker compose build

  integration-testing:
    name: System Integration Verification
    runs-on: ubuntu-latest
    needs: compile-and-build

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Build and Launch Application Mesh
        run: docker compose up --build -d

      - name: Grace Period for Database Boot
        run: |
          echo "Giving SQL Server time to initialize..."
          sleep 45

      - name: Wait for API Readiness
        run: |
          echo "Waiting for ChickenAPI to wake up at http://localhost:8080..."

          timeout 120s sh -c '
            until curl -sSf http://localhost:8080/swagger/index.html > /dev/null
            do
              sleep 2
            done
          '

          echo "ChickenAPI is up and running!"

      - name: Debug API Container Logs Before Request
        if: always()
        run: docker compose logs api-service

      - name: Debug Database Container Logs Before Request
        if: always()
        run: docker compose logs chick-db-service

      - name: Integration Step 1 - Seed Data via API
        continue-on-error: true
        run: |
          echo "Posting a new chicken payload to the database..."

          curl -X POST http://localhost:8080/api/Chicken \
            -H "Content-Type: application/json" \
            -d '{"name":"Cluck Norris","age":2,"breed":"Rhode Island Red","eggProduction":0.7,"isPregnant":false,"lastVetCheck":"2024-04-15T00:00:00Z"}' \
            --fail --verbose

      - name: Debug API Container Logs After Request
        if: always()
        run: docker compose logs api-service

      - name: Debug Database Container Logs After Request
        if: always()
        run: docker compose logs chick-db-service

      - name: Integration Step 2 - Verify Front-End MVC Data Rendering
        continue-on-error: true
        run: |
          echo "Querying the MVC web application on port 80..."

          MVC_RESPONSE=$(curl -s http://localhost:80)

          echo "=========== MVC PAGE RESPONSE ==========="
          echo "$MVC_RESPONSE"
          echo "========================================="

          echo "Checking if Jeffy exists in MVC output..."

          if echo "$MVC_RESPONSE" | grep -q "Jeffy"; then
            echo "Success: MVC interface successfully rendered chicken data!"
          else
            echo "Error: MVC interface failed to render chicken data."
            exit 1
          fi

      - name: Tear Down Mesh and Logs
        if: always()
        run: |
          docker compose logs api-service > api-container-debug.log
          docker compose logs chick-db-service > db-container-debug.log
          docker compose logs mvc-service > mvc-container-debug.log

          docker compose down --volumes

  cd-deployment:
    name: Production Cloud Deployment
    runs-on: ubuntu-latest
    needs: integration-testing

    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    environment: Production

    steps:
      - name: Execute Server Infrastructure Sync
        run: |
          echo "All automated checks passed!"
          echo "Initiating production deployment handshake..."